<!doctype html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3d2e" />
  <title>Ayyub · Today (for you)</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="login" class="view">
    <div class="login-card">
      <div id="w-brand" class="brand">☾ Ayyub’s Day</div>
      <p id="w-sub" class="brand-sub">A little window into his day.</p>
      <input id="login-email" class="field" type="email" placeholder="Email" autocomplete="username" />
      <input id="login-pw" class="field" type="password" placeholder="Password" autocomplete="current-password" />
      <p id="login-err" class="login-err"></p>
      <button id="btn-signin" class="btn">Sign in</button>
      <button id="btn-signup" class="btn ghost">Create account</button>
      <button id="btn-lang-login" class="lang-link"></button>
    </div>
  </div>

  <div id="app" class="view hidden">
    <header class="topbar">
      <span id="w-title" class="topbar-title">☾ His day, for you</span>
      <button id="btn-lang" class="lang-btn"></button>
    </header>
    <div id="demo-banner" class="demo-banner hidden"></div>
    <main id="wife-root" class="tab-root"></main>
  </div>

  <script type="module" src="./js/wife.js"></script>
</body>
</html>
