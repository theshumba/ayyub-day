<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3d2e" />
  <title>Ayyub · Day</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
</head>
<body>
  <!-- Login -->
  <div id="login" class="view">
    <div class="login-card">
      <div class="brand">☾ Ayyub’s Day</div>
      <p class="brand-sub">Plan the day around the prayer.</p>
      <input id="login-email" class="field" type="email" inputmode="email" placeholder="Email" autocomplete="username" />
      <input id="login-pw" class="field" type="password" placeholder="Password" autocomplete="current-password" />
      <p id="login-err" class="login-err"></p>
      <button id="btn-signin" class="btn">Sign in</button>
      <button id="btn-signup" class="btn ghost">Create account</button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="view hidden">
    <header class="topbar">
      <span class="topbar-title">☾ Ayyub’s Day</span>
      <button id="btn-settings" class="icon-btn" aria-label="Settings"></button>
    </header>
    <div id="demo-banner" class="demo-banner hidden">Demo mode — add Firebase to enable login &amp; the wife view.</div>
    <main id="tab-root" class="tab-root"></main>
    <nav id="tabbar" class="tabbar"></nav>
  </div>

  <div id="settings" class="modal hidden"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
